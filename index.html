<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>FITZONE CONNECT </title>
</head>
<body>
    <nav class = "navbar">
        <div class = "brand">
            <img src="gym logo.jpg" alt="logo">
        </div>
        <h2>FITZONE</h2>
        <div class = "contenido">
            <ul class = "opciones">
                <li><a href="#"> INICIO </a></li>
                <li><a href="#"> INSCRIBIR </a></li>
                <li><a href="#"> SERVICIOS </a></li>
                <li><a href="#"> CATEGORIA </a></li>
            </ul>
            <div class = "buscador">
                <input type="text" name="buscador" id="" placeholder="Buscar">
                <button type="submit"> INICIAR SESION </button>
            </div>
        </div>
    </nav>
    <form class = "register">
        <h2> BIENVENIDO A FITZONE CONNECT </h2>
        <div class = "campo">
            <label for="email"> Correo: </label>
            <input type="email" name="email" id="" placeholder="Ingrese su correo">
        </div>
        <div class = "campo">
            <label for="contraseña"> Contraseña: </label>
            <input type="password" name="contraseña" id="" placeholder="Ingrese una Contraseña">
        </div>
            <div class = "campo">
            <label for="contraseña-confirmar"> Contraseña: </label>
            <input type="password" name="contraseña" id="" placeholder="Confirme su Contraseña">
        </div>
        <button type="submit"> REGISTRARSE </button>
    </form>
    <footer class = "pie">
        <p>&copy;FITZONE CONNECT Todos los derechos reservados</p>
    </footer>
</body>
</html>
